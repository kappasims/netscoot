# separate terms of service, privacy policy, and support
# documentation.
#
# https://github.com/microsoft/action-psscriptanalyzer
# For more information on PSScriptAnalyzer in general, see
# https://github.com/PowerShell/PSScriptAnalyzer

# Supplementary security scan: runs the Microsoft PSScriptAnalyzer action over the whole repo and
# uploads SARIF to the Security tab. The gating lint (full PSScriptAnalyzer via build.ps1) lives in
# ci.yml; this is named distinctly so it does NOT collide with that required "PSScriptAnalyzer" check.
name: PowerShell security scan

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '40 10 * * 3'

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Inline equivalent of microsoft/psscriptanalyzer-action: install PSScriptAnalyzer +
      # ConvertToSARIF, run the security rules over the repo, emit SARIF. Done inline (not via the
      # action) so the module installs can RETRY - a transient PowerShell Gallery hiccup on the
      # ConvertToSARIF install used to fail the whole scheduled scan (and email a false alarm), and
      # an install failure means the scan silently does not run. The rules and output match what the
      # action produced. Use a POSIX path ('.'): the repo root on ubuntu-latest.
      - name: Run PSScriptAnalyzer (security rules) -> SARIF
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          function Install-ModuleWithRetry([string]$Name) {
            for ($i = 1; $i -le 5; $i++) {
              try {
                Install-Module -Name $Name -Scope CurrentUser -Force -AllowClobber -Repository PSGallery -ErrorAction Stop
                return
              } catch {
                Write-Host "::warning::Install of $Name failed (attempt $i/5): $($_.Exception.Message)"
                if ($i -eq 5) { throw }
                Start-Sleep -Seconds (5 * $i)
              }
            }
          }
          Install-ModuleWithRetry -Name PSScriptAnalyzer
          Install-ModuleWithRetry -Name ConvertToSARIF
          Import-Module PSScriptAnalyzer
          Import-Module ConvertToSARIF
          $rules = @('PSAvoidGlobalAliases', 'PSAvoidUsingConvertToSecureStringWithPlainText')
          Invoke-ScriptAnalyzer -Path . -Recurse -IncludeRule $rules |
            ConvertTo-SARIF -FilePath results.sarif

      # Upload the SARIF file generated in the previous step
      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
