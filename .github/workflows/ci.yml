name: CI

on:
  push:
  pull_request:

# Per-push CI runs on Windows (PS7 + Windows PowerShell 5.1) plus lint. Linux and macOS are
# on-demand (.github/workflows/platforms.yml, via tools/Invoke-PlatformCI.ps1) - run them before a
# release. The cross-platform code rarely regresses per-OS, and this keeps every push fast.
jobs:
  test:
    name: Test (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # DotnetMove delegates to the dotnet CLI and uses .slnx (SDK 9+); tests build net10 fixtures.
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # build.ps1 no longer auto-installs Pester; CI provisions it explicitly.
      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -MinimumVersion 5.0 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run tests
        shell: pwsh
        run: ./build.ps1 -Task Test

  lint:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Analyze
        shell: pwsh
        run: ./build.ps1 -Task Analyze

  # The cross-platform managed cmdlets must ALSO work on Windows PowerShell 5.1 (Desktop).
  test-windows-powershell:
    name: Test (Windows PowerShell 5.1)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install Pester (Windows PowerShell 5.1)
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Install-PackageProvider -Name NuGet -Force | Out-Null
          Install-Module Pester -MinimumVersion 5.0 -Scope CurrentUser -Force -SkipPublisherCheck
      - name: Run tests on Windows PowerShell 5.1
        shell: powershell
        run: ./build.ps1 -Task Test
