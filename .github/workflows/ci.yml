name: CI

# A pull request from a branch in this repo already fires `pull_request`, so scoping `push` to the
# long-lived branches avoids running the whole matrix twice for the same commit (the duplicate run
# also leaves redundant, slower-settling status checks). Pushes to develop/master still run CI - the
# release flow (prepare on develop, fast-forward master) depends on it.
on:
  push:
    branches: [develop, master]
  pull_request:
  # Manual trigger to run the full matrix (including the Linux/macOS jobs below) on demand.
  workflow_dispatch:

# One in-flight run per PR (or per pushed ref); a newer commit cancels the superseded run instead of
# letting both race to completion.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# CI only reads the repository (checkout) and reads packages (action/tooling pulls); it never writes
# back, so grant the minimum and drop the default write scopes.
permissions:
  contents: read
  packages: read

# Per-push CI runs on Windows (PS7 + Windows PowerShell 5.1) plus lint. Linux and macOS are
# on-demand (.github/workflows/platforms.yml, via tools/Invoke-PlatformCI.ps1) - run them before a
# release. The cross-platform code rarely regresses per-OS, and this keeps every push fast.
jobs:
  test:
    # Sharded into parallel jobs (separate processes): the suite shares process-global state
    # (current dir, env vars, the module table), so it cannot be parallelized in-process. Each shard
    # runs a disjoint slice of the test files. The shard count is duplicated in -ShardCount below; if
    # you change it, update the matrix AND the required status checks in branch protection.
    name: Test (windows-latest) [${{ matrix.shard }}/3]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      # Netscoot delegates to the dotnet CLI and uses .slnx (SDK 9+); tests build net10 fixtures.
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Cache the pinned Pester so the install step is skipped on a hit (the version is immutable, so
      # the key never needs to change until we bump it). This removes a slow, PSGallery-dependent step
      # from every run after the first.
      - name: Cache Pester
        id: cache-pester
        uses: actions/cache@v4
        with:
          path: ~\Documents\PowerShell\Modules\Pester
          key: pester-pwsh-5.7.1-${{ runner.os }}

      # build.ps1 no longer auto-installs Pester; CI provisions it (pinned) on a cache miss, retrying
      # so a transient PSGallery/NuGet hiccup does not fail the gate.
      - name: Install Pester
        if: steps.cache-pester.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          for ($i = 1; $i -le 3; $i++) {
            try { Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck; break }
            catch { if ($i -eq 3) { throw }; Write-Host "Install-Module Pester failed (attempt $i); retrying in 10s..."; Start-Sleep 10 }
          }

      - name: Run tests
        shell: pwsh
        run: ./build.ps1 -Task Test -ShardIndex ${{ matrix.shard }} -ShardCount 3

  lint:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Install a current PSScriptAnalyzer rather than relying on the runner image's bundled copy.
      # Older bundled versions throw "more than one dynamic module in each dynamic assembly" from the
      # per-file analyze loop (a reflection-emit limit), which is an analyzer-version artifact, not a
      # finding. Pinning here keeps the gate deterministic and matched to the supported toolchain.
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          function Install-ModuleWithRetry([string]$Name) {
            for ($i = 1; $i -le 5; $i++) {
              try {
                Install-Module -Name $Name -Scope CurrentUser -Force -AllowClobber -Repository PSGallery -ErrorAction Stop
                return
              } catch {
                Write-Host "::warning::Install of $Name failed (attempt $i/5): $($_.Exception.Message)"
                if ($i -eq 5) { throw }
                Start-Sleep -Seconds (5 * $i)
              }
            }
          }
          Install-ModuleWithRetry -Name PSScriptAnalyzer
      - name: Analyze
        shell: pwsh
        run: ./build.ps1 -Task Analyze

  # The cross-platform managed cmdlets must ALSO work on Windows PowerShell 5.1 (Desktop).
  test-windows-powershell:
    name: Test (Windows PowerShell 5.1) [${{ matrix.shard }}/3]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      # Cache Pester for Desktop too. This is the bigger win: the 5.1 install bootstraps the NuGet
      # provider and pulls Pester through the older PowerShellGet, ~90-120s vs ~20s on PS7. A cache hit
      # skips the whole step (provider bootstrap included). The WindowsPowerShell module path differs
      # from PS7's, so this is a separate cache entry.
      - name: Cache Pester (Windows PowerShell 5.1)
        id: cache-pester
        uses: actions/cache@v4
        with:
          path: ~\Documents\WindowsPowerShell\Modules\Pester
          key: pester-winps-5.7.1-${{ runner.os }}
      - name: Install Pester (Windows PowerShell 5.1)
        if: steps.cache-pester.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          $ErrorActionPreference = 'Stop'
          for ($i = 1; $i -le 3; $i++) {
            try {
              Install-PackageProvider -Name NuGet -Force | Out-Null
              Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck
              break
            } catch { if ($i -eq 3) { throw }; Write-Host "Pester install failed (attempt $i); retrying in 10s..."; Start-Sleep 10 }
          }
      - name: Run tests on Windows PowerShell 5.1
        shell: powershell
        run: ./build.ps1 -Task Test -ShardIndex ${{ matrix.shard }} -ShardCount 3

  # Linux + macOS. Per-push CI stays Windows-only for speed; these run only when this is a release
  # prep commit ("release: vX.Y.Z", pushed by the release flow) or on a manual dispatch, so a module
  # release always gets the full cross-platform gate automatically - no separate platforms.yml
  # dispatch + poll. (platforms.yml is still available for an ad-hoc on-demand run.)
  test-platforms:
    name: Test (${{ matrix.os }}) [${{ matrix.shard }}/3]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.event.head_commit.message, 'release: '))
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        shard: [1, 2, 3]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install Pester
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          for ($i = 1; $i -le 3; $i++) {
            try { Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck; break }
            catch { if ($i -eq 3) { throw }; Write-Host "Install-Module Pester failed (attempt $i); retrying in 10s..."; Start-Sleep 10 }
          }
      - name: Run tests
        shell: pwsh
        run: ./build.ps1 -Task Test -ShardIndex ${{ matrix.shard }} -ShardCount 3
