name: Release (prepare)

# One-click release prep. Stamps the version into every manifest, commits "release: vX.Y.Z", and
# pushes develop. That push triggers CI (ci.yml), which runs the FULL matrix - Windows, Windows
# PowerShell 5.1, AND Linux/macOS (ci.yml runs the platform jobs on a "release: " commit) - plus
# lint. No separate platforms.yml dispatch or polling.
#
# Prerequisite: the "## [X.Y.Z]" CHANGELOG section must already be committed on develop (the prepare
# step requires it). Finalize stays a local admin step once every check is green:
#   ./build.ps1 -Task Release -Version X.Y.Z -Publish      # fast-forward master, tag, GitHub release
#   ./build.ps1 -Task Publish -ApiKey <key>                # optional: publish to the PowerShell Gallery
on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to release (x.y.z), e.g. 2.7.0
        required: true
        type: string

# Needs write to push the release-prep commit to develop. (Requires develop's "require a pull
# request" rule relaxed so GITHUB_TOKEN can push; required status checks still apply.)
permissions:
  contents: write

jobs:
  prepare:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          fetch-tags: true

      - name: Configure git identity
        shell: pwsh
        run: |
          git checkout develop
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      # -SkipGate skips the local PSScriptAnalyzer + Pester gate (CI runs the full matrix on the
      # pushed commit); the cheap prep checks (docs-not-stale, CHANGELOG entry, src-change guard)
      # still run. Stamps manifests, commits "release: vX.Y.Z", and pushes develop.
      - name: Prepare release (stamp + commit + push develop)
        shell: pwsh
        run: ./build.ps1 -Task Release -Version '${{ inputs.version }}' -SkipGate

      - name: Next steps
        shell: pwsh
        run: |
          Write-Host "Prepared v${{ inputs.version }} on develop and pushed."
          Write-Host "CI now runs the full matrix (incl. Linux/macOS) on the release commit."
          Write-Host "When every check is green, finalize locally:"
          Write-Host "  ./build.ps1 -Task Release -Version ${{ inputs.version }} -Publish"
